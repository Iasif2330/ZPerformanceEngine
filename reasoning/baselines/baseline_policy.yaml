baseline:
  type: rolling

  rolling:
    window_size: 3          # MUST be >1 for stability
    min_required: 2         # learning threshold
    aggregation: median

    retention:
      max_snapshots: 10     # retain more than window to absorb noise

  snapshot:
    name: null

scope:
  match_current_run: true

storage:
  path: reasoning/baselines/snapshots