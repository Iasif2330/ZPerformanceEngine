baseline:
  type: rolling

  rolling:
    window_size: 2          # MUST be >1 for stability
    min_required: 1         # learning threshold
    aggregation: median

    retention:
      max_snapshots: 3    # retain more than window to absorb noise

  snapshot:
    name: null

scope:
  match_current_run: true

storage:
  path: reasoning/baselines/snapshots